name: sim-city-ci

# Only runs when files inside sim-city/ change, so it doesn't waste minutes
# on commits that only touch the rest of the citySim repo.
on:
  push:
    branches: [main]
    paths:
      - "sim-city/**"
      - ".github/workflows/sim-city-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "sim-city/**"
      - ".github/workflows/sim-city-ci.yml"

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sim-city
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: sim-city/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: ruff format --check src tests
      - run: mypy src
      - run: pytest -q

  viewer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sim-city/viewer
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: sim-city/viewer/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
